name: Secret Guard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if secret-like files are tracked
        run: |
          set -euo pipefail
          bad="$(git ls-files | egrep -n '(^|/)(\.env(\..*)?|.*\.pem|.*\.key)$' || true)"
          if [ -n "$bad" ]; then
            echo "Blocked: secret-like files are tracked:"
            echo "$bad"
            exit 1
          fi

      - name: Fail if obvious secret env keys appear in tracked files
        run: |
          set -euo pipefail
          # Simple guardrail. This is not a full secret scanner.
          if git grep -nE 'SUPABASE_SERVICE_ROLE_KEY\s*=|KALSHI_API_KEY_ID\s*=|BEGIN (RSA|OPENSSH) PRIVATE KEY' -- .; then
            echo "Blocked: secret-looking content detected in tracked files."
            exit 1
          fi

