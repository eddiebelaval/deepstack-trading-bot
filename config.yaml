# Kalshi Trading Bot Configuration
#
# This is the main configuration file for the trading bot.
# Settings here override environment variables.
#
# Available profiles: conservative, aggressive, scalper, prediction_market
# Or set profile: null to use settings below directly.

profile: null  # Load a profile from profiles/ directory

strategies:
  - name: mean_reversion
    enabled: true
    markets:
      - platform: kalshi
        series: INXD          # S&P 500 hourly contracts
    config:
      price_floor_cents: 45   # Min YES price to consider
      price_ceiling_cents: 55 # Max YES price to consider
      take_profit_cents: 8    # Exit with profit at +8c
      stop_loss_cents: 5      # Exit with loss at -5c
      min_volume: 100         # Minimum market volume
      min_score: 30           # Minimum opportunity score

  - name: momentum
    enabled: true             # ENABLED for multi-strategy test
    markets:
      - platform: kalshi
        series: "*"           # Scan all markets
    config:
      lookback_periods: 5
      momentum_threshold: 0.03
      take_profit_cents: 10
      stop_loss_cents: 6
      min_volume: 200
      reversal_threshold: 0.02

  - name: combinatorial_arbitrage
    enabled: true             # ENABLED - $40M alpha strategy
    markets:
      - platform: kalshi
        series: "*"           # Scan ALL markets for arb
    config:
      min_profit_cents: 2     # Min guaranteed profit
      max_exposure_per_arb: 100
      min_liquidity: 50
      max_spread_cents: 5
      max_legs: 5
      confidence_threshold: 0.8

  - name: cross_platform_arbitrage
    enabled: true             # ENABLED - Polymarket intelligence
    markets:
      - platform: kalshi
        series: "*"           # Trade on Kalshi
      - platform: polymarket
        series: "*"           # Data source only (read-only)
        scan: false           # Dependency only — don't run a separate scan pass
    config:
      # Price difference threshold to trigger signal
      price_diff_threshold_cents: 5
      # Market matching configuration
      min_match_score: 0.6    # Minimum fuzzy match confidence (0-1)
      max_expiry_diff_days: 7 # Max days between expiry dates for match
      # Volume filters
      min_polymarket_volume: 10000  # Min Polymarket 24h volume in dollars
      min_kalshi_volume: 100        # Min Kalshi volume
      # Volume momentum confirmation
      use_volume_confirmation: true
      volume_momentum_threshold: 1.5  # 50% volume increase = momentum
      # Risk management
      take_profit_cents: 5    # Exit when price converges 5c
      stop_loss_cents: 3      # Tight stop for cross-platform plays
      min_score: 40           # Higher bar for cross-platform signals

  # === Prediction Market Native Strategies (disabled by default) ===

  # Disabled: 2-5c margins too thin, ties up capital for minimal return at scale
  - name: high_probability_bonds
    enabled: false            # Buy 93-98c contracts, hold to settlement
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_probability_cents: 93
      max_probability_cents: 98
      min_volume: 500
      max_hours_to_expiry: 72
      stop_loss_cents: 8
      take_profit_cents: 2
      min_score: 30

  # Disabled: favorite-longshot bias unproven on Kalshi, no historical validation data
  - name: calibration_edge
    enabled: false            # Exploit favorite-longshot bias
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_edge_cents: 3
      favorite_threshold_cents: 70
      longshot_threshold_cents: 30
      take_profit_cents: 6
      stop_loss_cents: 4

  # Disabled: no model consensus pipeline built, untested theoretical edge
  - name: weather_aggregation
    enabled: false            # Trade weather markets via model consensus
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_edge_cents: 5
      min_model_consensus: 0.7
      target_cities: ["new_york", "chicago"]
      max_hours_to_settlement: 48
      take_profit_cents: 7
      stop_loss_cents: 5

  # Disabled: LLM cost per eval, overreaction detection needs backtesting before live capital
  - name: news_sentiment_fade
    enabled: false            # Fade overreactions (needs ANTHROPIC_API_KEY)
    markets:
      - platform: kalshi
        series: "*"
    config:
      spike_threshold_cents: 10
      spike_window_minutes: 5
      min_volume_surge: 2.0
      llm_overreaction_threshold: 0.6
      max_hold_hours: 4
      enable_llm: true
      take_profit_cents: 6
      stop_loss_cents: 4

  - name: correlated_event_arbitrage
    enabled: false            # Trade logical relationship mispricings
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_implication_edge_cents: 3
      min_match_confidence: 0.7
      max_legs: 3
      relationship_types: ["implication", "complement", "subset"]
      take_profit_cents: 5
      stop_loss_cents: 4

  - name: domain_specialization
    enabled: false            # Multi-signal domain expertise (needs tuning)
    markets:
      - platform: kalshi
        series: "*"
    config:
      domain: crypto_price
      min_signal_strength: 0.6
      take_profit_cents: 8
      stop_loss_cents: 5

  # === New Strategies (Feb 2026) ===

  - name: crypto_intraday
    enabled: false            # Short-timeframe crypto with external price feeds
    markets:
      - platform: kalshi
        series: "KXBTC"
      - platform: kalshi
        series: "KXETH"
      - platform: kalshi
        series: "KXSOL"
    config:
      price_source: coingecko
      min_edge_cents: 3
      take_profit_cents: 6
      stop_loss_cents: 4
      min_volume: 50
      max_hold_minutes: 45

  # Disabled: macro timing notoriously unreliable, long hold periods tie up capital
  - name: bear_macro
    enabled: false            # Economic indicator trading via FRED (needs FRED_API_KEY)
    markets:
      - platform: kalshi
        series: "KXFED"
      - platform: kalshi
        series: "KXCPI"
      - platform: kalshi
        series: "KXGDP"
      - platform: kalshi
        series: "KXJOBS"
    config:
      min_edge_cents: 5
      bear_mode_only: false
      take_profit_cents: 10
      stop_loss_cents: 7
      min_volume: 50
      max_hold_hours: 168

  # Disabled: proven loser, -$10.83 in 23 trades — spread capture bleeds in low-liquidity markets
  - name: market_making
    enabled: false            # Non-directional spread capture
    markets:
      - platform: kalshi
        series: "KXBTC"
      - platform: kalshi
        series: "KXETH"
      - platform: kalshi
        series: "INXD"
    config:
      min_spread_cents: 3
      max_spread_cents: 15
      inventory_limit: 10
      skew_per_contract: 1
      take_profit_cents: 3
      stop_loss_cents: 5
      min_volume: 50

  - name: tv_signals
    enabled: false              # Start disabled, enable manually after paper trade validation
    markets:
      - platform: kalshi
        series: "*"
    config:
      paper_trade: true         # HARD DEFAULT: no real orders until explicitly set false
      min_composite_score: 0.5
      min_sharpe: 1.0
      max_positions: 3
      take_profit_cents: 10
      stop_loss_cents: 5
      min_volume: 100
      min_score: 40

risk:
  max_position_size: 50       # Max dollars per trade
  daily_loss_limit: 100       # Stop trading after this daily loss
  kelly_fraction: 0.5         # Use half-Kelly for safety
  max_per_series: 2           # Max opportunities per series (correlation cap)

learning:
  prior_strength: 20          # Bayesian k: trades needed to equal prior weight
  decay_half_life: 30.0       # Days until trade weight halves
  auto_disable: true          # Auto-disable strategies with sustained negative EV

# CryExc real-time exchange data (sub-second trades, orderbook, liquidations, CVD)
# Provides 10-30s information edge over REST polling for crypto strategies.
# Set enabled: true when CryExc server is running locally.
cryexc:
  enabled: true               # ACTIVE: CryExc real-time data feeding crypto strategies
  url: "ws://localhost:8086/ws"
  symbols:
    - symbol: BTCUSDT
      exchanges: []           # Empty = all exchanges (Binance, Bybit, OKX, etc.)
      min_notional_trade: 50000   # Only relay trades > $50K (whale trades)
      min_notional_liq: 100000    # Only relay liquidations > $100K
    - symbol: ETHUSDT
      exchanges: []
      min_notional_trade: 25000
      min_notional_liq: 50000
    - symbol: SOLUSDT
      exchanges: []
      min_notional_trade: 10000
      min_notional_liq: 25000
  reconnect:
    base_seconds: 1.0         # Initial retry delay
    max_seconds: 30.0         # Max retry delay (exponential backoff)

# Claude intelligence layer — qualitative analysis of trade journal data.
# Sends closed trades to Claude for strategy assessment, pattern detection,
# and Kelly fraction recommendations. Requires ANTHROPIC_API_KEY.
analysis:
  enabled: true
  model: "claude-sonnet-4-5-20250929"
  auto_apply_kelly: true       # Auto-adjust Kelly fractions from analysis
  auto_apply_params: false     # Strategy param changes require human review
  min_trades_for_analysis: 10  # Skip analysis with fewer closed trades

# Market governance engine — proactive regime detection and strategy routing.
# Detects market conditions (trending, mean-reverting, choppy, calm) and
# enables/disables strategies accordingly. Never overrides safety layers.
governance:
  enabled: true                 # Advisory mode — log only, no strategy changes
  mode: advisory                # advisory (log only), autonomous (act), manual (suggest)
  lookback_periods: 20          # Market snapshots for rolling window
  min_confidence: 0.6           # Minimum regime confidence to act
  fitness_min_trades: 5         # Trades per regime to trust fitness score
  enable_threshold: 0.5         # Fitness above this = enable strategy
  disable_threshold: 0.3        # Fitness below this = disable strategy
  bleed_window_hours: 24        # P&L trend window for bleed detection
  bleed_threshold_cents: -50    # Cumulative loss threshold
  bleed_slope_threshold: -0.5   # Cents/hour slope threshold
  max_strategies_disabled_pct: 0.75  # Never disable more than 75%
  reenable_cooldown_hours: 6    # Minimum cooldown for re-enable

# Captain's Log — streaming AI narration of bot observations and decisions.
# The bot narrates what it sees, thinks, and decides in real-time.
# Entries appear in a chat panel on the dashboard. User can reply.
captains_log:
  enabled: true
  routine_interval_seconds: 120   # Min seconds between routine narrations
  significant_interval_seconds: 60 # Min seconds between significant narrations
  max_tokens: 300                 # Max tokens per narration
  max_context_entries: 20         # Recent log entries for context window
