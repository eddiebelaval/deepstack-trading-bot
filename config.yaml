# Kalshi Trading Bot Configuration
#
# This is the main configuration file for the trading bot.
# Settings here override environment variables.
#
# Available profiles: conservative, aggressive, scalper, prediction_market
# Or set profile: null to use settings below directly.

profile: null  # Load a profile from profiles/ directory

strategies:
  # [Round 3 Assessment: B- rating — UNANIMOUS: mean reversion structurally invalid for binary contracts]
  # Mean reversion disabled. Binary contracts settle at 0/100 — reversion to 50 fights the physics.
  # Pivoted to calibration_edge (favorite-longshot bias) per Nakamura/Blackwood/Webb recommendations.
  - name: mean_reversion
    enabled: false            # DISABLED: thesis incompatible with binary contracts (Round 3 P0)
    markets:
      - platform: kalshi
        series: INXD          # S&P 500 hourly contracts
      - platform: kalshi
        series: KXBTC         # Bitcoin — trades 24/7
      - platform: kalshi
        series: KXETH         # Ethereum — trades 24/7
    config:
      price_floor_cents: 40
      price_ceiling_cents: 60
      take_profit_cents: 8
      stop_loss_cents: 5
      min_volume: 100         # Restored from 50 (P1-4: quality over quantity)
      min_score: 30           # Restored from 20 (P1-4: quality over quantity)

  - name: momentum
    enabled: false            # Disabled (P0-5: reduce to single strategy)
    markets:
      - platform: kalshi
        series: "*"
    config:
      lookback_periods: 5
      momentum_threshold: 0.03
      take_profit_cents: 10
      stop_loss_cents: 6
      min_volume: 200         # Restored from 50 (P1-4)
      min_score: 30           # Restored from 20 (P1-4)
      reversal_threshold: 0.02

  - name: combinatorial_arbitrage
    enabled: false            # Disabled (P0-5: 0 trades in history, no atomic execution)
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_profit_cents: 2
      max_exposure_per_arb: 100
      min_liquidity: 50       # Restored from 25 (P1-4)
      max_spread_cents: 5
      max_legs: 5
      confidence_threshold: 0.8

  - name: cross_platform_arbitrage
    enabled: false            # Disabled (P0-5: 0 trades, fuzzy matching risk)
    markets:
      - platform: kalshi
        series: "*"
      - platform: polymarket
        series: "*"
        scan: false
    config:
      price_diff_threshold_cents: 5
      min_match_score: 0.80   # Restored from 0.45 (P1-4: prevent false matches)
      max_expiry_diff_days: 7
      min_polymarket_volume: 10000  # Restored from 2000 (P1-4)
      min_kalshi_volume: 100
      use_volume_confirmation: true
      volume_momentum_threshold: 1.5
      take_profit_cents: 5
      stop_loss_cents: 3
      min_score: 40

  # === Prediction Market Native Strategies (disabled by default) ===

  # Disabled: 2-5c margins too thin, ties up capital for minimal return at scale
  - name: high_probability_bonds
    enabled: false            # Buy 93-98c contracts, hold to settlement
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_probability_cents: 93
      max_probability_cents: 98
      min_volume: 500
      max_hours_to_expiry: 72
      stop_loss_cents: 8
      take_profit_cents: 2
      min_score: 30

  # [Round 4 Assessment: B- — settlement-aware redesign]
  # Calibration edge exploits favorite-longshot bias at settlement.
  # Round 4 P0 fixes: settlement hold mode, research-backed priors (65%/12c/8c),
  # wide safety stops (15c), time-to-expiry filter (72h max).
  # Round 12 fix: wildcard scan flooded with sports combos (KXMVE*), zero liquidity.
  # Switched to specific series with real order books + liquidity.
  - name: calibration_edge
    enabled: true             # PRIMARY STRATEGY: Exploit favorite-longshot bias (Round 3 pivot)
    markets:
      - platform: kalshi
        series: KXBTC         # Bitcoin — 14 active contracts, 24h expiry cycle
      - platform: kalshi
        series: KXETH         # Ethereum — lower liquidity but tradeable
      - platform: kalshi
        series: KXFED         # Fed funds rate — 47 active, high volume, long-dated
      - platform: kalshi
        series: KXCPI         # CPI — 43 active, macro bet
      - platform: kalshi
        series: KXGDP         # GDP — 8 active, 30-36c longshots, good volume
    config:
      min_edge_cents: 3
      favorite_threshold_cents: 70
      longshot_threshold_cents: 30
      take_profit_cents: 15    # Round 4 P0: wide — bonus early exit, not primary exit
      stop_loss_cents: 15      # Round 4 P0: wide safety stop for catastrophic moves only
      max_hours_to_expiry: 1500  # Extended: covers GDP (57 days). Self-reg can extend further.
      min_volume: 25           # Relaxed: crypto/macro markets have lower volume than sports

  # Disabled: no model consensus pipeline built, untested theoretical edge
  - name: weather_aggregation
    enabled: false            # Trade weather markets via model consensus
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_edge_cents: 5
      min_model_consensus: 0.7
      target_cities: ["new_york", "chicago"]
      max_hours_to_settlement: 48
      take_profit_cents: 7
      stop_loss_cents: 5

  # Disabled: LLM cost per eval, overreaction detection needs backtesting before live capital
  - name: news_sentiment_fade
    enabled: false            # Fade overreactions (needs ANTHROPIC_API_KEY)
    markets:
      - platform: kalshi
        series: "*"
    config:
      spike_threshold_cents: 10
      spike_window_minutes: 5
      min_volume_surge: 2.0
      llm_overreaction_threshold: 0.6
      max_hold_hours: 4
      enable_llm: true
      take_profit_cents: 6
      stop_loss_cents: 4

  - name: correlated_event_arbitrage
    enabled: false            # Trade logical relationship mispricings
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_implication_edge_cents: 3
      min_match_confidence: 0.7
      max_legs: 3
      relationship_types: ["implication", "complement", "subset"]
      take_profit_cents: 5
      stop_loss_cents: 4

  - name: domain_specialization
    enabled: false            # Multi-signal domain expertise (needs tuning)
    markets:
      - platform: kalshi
        series: "*"
    config:
      domain: crypto_price
      min_signal_strength: 0.6
      take_profit_cents: 8
      stop_loss_cents: 5

  # === New Strategies (Feb 2026) ===

  - name: crypto_intraday
    enabled: false            # Short-timeframe crypto with external price feeds
    markets:
      - platform: kalshi
        series: "KXBTC"
      - platform: kalshi
        series: "KXETH"
      - platform: kalshi
        series: "KXSOL"
    config:
      price_source: coingecko
      min_edge_cents: 3
      take_profit_cents: 6
      stop_loss_cents: 4
      min_volume: 50
      max_hold_minutes: 45

  # Disabled: macro timing notoriously unreliable, long hold periods tie up capital
  - name: bear_macro
    enabled: false            # Economic indicator trading via FRED (needs FRED_API_KEY)
    markets:
      - platform: kalshi
        series: "KXFED"
      - platform: kalshi
        series: "KXCPI"
      - platform: kalshi
        series: "KXGDP"
      - platform: kalshi
        series: "KXJOBS"
    config:
      min_edge_cents: 5
      bear_mode_only: false
      take_profit_cents: 10
      stop_loss_cents: 7
      min_volume: 50
      max_hold_hours: 168

  # Disabled: proven loser, -$10.83 in 23 trades — buys cheap contracts hoping for settlement, not actual market making
  - name: settlement_betting
    enabled: false            # Buys cheap YES contracts near expiry hoping for settlement
    markets:
      - platform: kalshi
        series: "KXBTC"
      - platform: kalshi
        series: "KXETH"
      - platform: kalshi
        series: "INXD"
    config:
      min_spread_cents: 3
      max_spread_cents: 15
      inventory_limit: 10
      skew_per_contract: 1
      take_profit_cents: 3
      stop_loss_cents: 5
      min_volume: 50

  - name: tv_signals
    enabled: false              # Start disabled, enable manually after paper trade validation
    markets:
      - platform: kalshi
        series: "*"
    config:
      paper_trade: true         # HARD DEFAULT: no real orders until explicitly set false
      min_composite_score: 0.5
      min_sharpe: 1.0
      max_positions: 3
      take_profit_cents: 10
      stop_loss_cents: 5
      min_volume: 100
      min_score: 40

  # === Stock Trading Strategies (IBKR) ===

  - name: stock_momentum
    enabled: false              # DISABLED: 0/3 WR, -$149.52, position sizing bug fixed (2026-03-19 triage)
    markets:
      - platform: ibkr
        series: "*"             # Uses IBKR watchlist from ibkr.watchlist config
    config:
      paper_trade: true         # HARD DEFAULT: paper only until graduation gate passes
      min_sharpe: 1.0           # Minimum Sharpe from TradingView backtests
      min_win_rate: 60.0        # Minimum win rate % from backtests
      min_trades: 5             # Minimum backtest trade count (filter noise)
      min_strategies: 2         # Minimum strategy consensus per ticker
      take_profit_pct: 0.03     # 3% take profit
      stop_loss_pct: 0.015      # 1.5% stop loss
      max_positions: 5          # Max concurrent stock positions
      min_score: 40             # Minimum consensus score from TV validation

  # === Futures Trading Strategies (IBKR) ===

  - name: futures_trend
    enabled: false              # DISABLED: No futures data subscription on IBKR paper (2026-03-19 triage)
    markets:
      - platform: ibkr
        series: "futures"       # Uses IBKR futures_watchlist
    config:
      paper_trade: true         # HARD DEFAULT: paper only until graduation gate passes
      min_regime_confidence: 0.5  # Minimum stock regime confidence to enter
      take_profit_pct: 0.01     # 1% TP (leveraged — 1 /MES = 5x SPY)
      stop_loss_pct: 0.005      # 0.5% SL (tight for leverage)
      max_positions: 2          # Max concurrent futures positions
      min_score: 40             # Minimum opportunity score
      allowed_regimes:          # Only trade in these regimes
        - trending_up
        - trending_down

  # === Options Trading Strategies (IBKR) ===

  - name: options_income
    enabled: false              # DISABLED: No options data subscription on IBKR paper (2026-03-19 triage)
    markets:
      - platform: ibkr
        series: "options"       # Uses IBKR watchlist for option chain fetching
    config:
      paper_trade: true         # HARD DEFAULT: paper only until graduation gate passes
      min_sharpe: 1.0           # Minimum Sharpe from TV backtests (for underlying)
      min_win_rate: 60.0        # Minimum win rate from backtests
      min_strategies: 2         # Minimum TV strategy consensus per ticker
      target_dte_min: 20        # Minimum days to expiration
      target_dte_max: 45        # Maximum days to expiration
      otm_pct_min: 0.05         # Minimum 5% out of the money
      otm_pct_max: 0.10         # Maximum 10% out of the money
      min_premium_pct: 0.01     # Minimum 1% of strike in premium
      max_positions: 3          # Max concurrent option positions
      min_score: 40             # Minimum opportunity score

  # === Crisis Alpha Strategy (IBKR) ===

  - name: crisis_alpha
    enabled: false              # DISABLED: No market data subscription on IBKR paper (2026-03-19 triage)
    markets:
      - platform: ibkr
        series: "*"             # Uses IBKR watchlist (crisis tickers added)
    config:
      paper_trade: true         # Paper only until graduation gate passes
      min_regime_confidence: 0.4  # Lower threshold — react faster to crisis signals
      take_profit_pct: 0.05     # 5% take profit
      stop_loss_pct: 0.03       # 3% stop loss
      max_positions: 5          # Max concurrent crisis positions
      min_score: 35             # Lower threshold — act faster in crisis
      use_leveraged: true       # Allow 3x inverse ETFs (SQQQ, SDOW)
      use_geopolitical: true    # Enable oil/defense plays

  # === Options Directional Strategy (IBKR) ===

  - name: options_directional
    enabled: false              # DISABLED: No options data subscription on IBKR paper (2026-03-19 triage)
    markets:
      - platform: ibkr
        series: "options"       # Uses IBKR watchlist for option chains
    config:
      paper_trade: true         # Paper only until graduation gate passes
      min_sharpe: 0.8           # Lower Sharpe threshold (directional bets are higher risk)
      min_win_rate: 55.0        # Lower WR requirement
      min_strategies: 2         # TV consensus minimum
      min_regime_confidence: 0.45  # Regime confidence to enter
      target_dte_min: 14        # Minimum 14 DTE (enough time for move)
      target_dte_max: 45        # Maximum 45 DTE (avoid time decay)
      otm_pct_max: 0.20         # Max 20% out of the money
      take_profit_pct: 0.50     # 50% gain on premium = exit
      stop_loss_pct: 0.40       # 40% loss on premium = cut
      max_positions: 4          # Max concurrent option buys
      min_score: 35             # Opportunity score threshold

risk:
  max_position_size: 10       # Max dollars per trade (P0-4: was $50 = 33% of $152)
  daily_loss_limit: 5         # Stop trading after this daily loss (P0-3: was $100 = 66% of $152)
  max_open_exposure: 25       # Round 5 P0: Max total open position value ($25 = ~16% of $152)
  kelly_fraction: 0.02        # Fractional Kelly — floor override at $1 min position (Webb R5)
  max_per_series: 2           # Max opportunities per series (correlation cap)
  consecutive_loss_limit: 3   # Round 5 P0: was 5 — recalibrated for binary settlement variance (Tanaka)
  # Portfolio-level circuit breakers (P0-2: none existed before Round 1)
  max_portfolio_drawdown_pct: 0.20  # Halt ALL trading if account drops 20% from session start
  min_balance_floor: 50       # Halt ALL trading if balance drops below $50

learning:
  prior_strength: 5           # Bayesian k: reduced from 20 (P2-8: faster convergence to observed data)
  decay_half_life: 30.0       # Days until trade weight halves
  auto_disable: false         # OFF: strategies are disabled for structural reasons, not just EV

# CryExc real-time exchange data (sub-second trades, orderbook, liquidations, CVD)
# Provides 10-30s information edge over REST polling for crypto strategies.
# Set enabled: true when CryExc server is running locally.
cryexc:
  enabled: true               # ACTIVE: CryExc real-time data feeding crypto strategies
  url: "ws://localhost:8086/ws"
  symbols:
    - symbol: BTCUSDT
      exchanges: []           # Empty = all exchanges (Binance, Bybit, OKX, etc.)
      min_notional_trade: 50000   # Only relay trades > $50K (whale trades)
      min_notional_liq: 100000    # Only relay liquidations > $100K
    - symbol: ETHUSDT
      exchanges: []
      min_notional_trade: 25000
      min_notional_liq: 50000
    - symbol: SOLUSDT
      exchanges: []
      min_notional_trade: 10000
      min_notional_liq: 25000
  reconnect:
    base_seconds: 1.0         # Initial retry delay
    max_seconds: 30.0         # Max retry delay (exponential backoff)

# Interactive Brokers — stock trading via TWS/Gateway.
# Requires IB TWS or Gateway running locally. Paper trading on port 7497, live on 7496.
# Disabled by default — enable when TWS is running and you want stock trading.
ibkr:
  enabled: true               # Paper trading active (Phase 2)
  host: "127.0.0.1"
  port: 4002                  # 4002 = IB Gateway paper, 4001 = Gateway live, 7497 = TWS paper
  client_id: 1
  account: ""                 # Leave empty for default account
  watchlist:
    # Core stock tickers (tradeable)
    - SPY       # S&P 500 ETF — broad market barometer
    - QQQ       # Nasdaq 100 ETF — tech sector barometer
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - TSLA
    # Crisis / Inverse ETFs (bought during downtrends)
    - SQQQ      # -3x Nasdaq 100 — primary bear instrument
    - SDOW      # -3x Dow Jones — bear instrument
    - SH        # -1x S&P 500 — conservative bear
    - UVXY      # 1.5x VIX Futures — volatility spike play
    # Safe Haven (bought during uncertainty)
    - GLD       # Gold ETF — safe haven / inflation hedge
    - TLT       # 20+ Year Treasury Bond ETF — flight to safety
    # Energy / Geopolitical (oil crisis, war)
    - USO       # Crude Oil Fund — oil price exposure
    - XLE       # Energy Sector ETF — broad energy
    # Defense (war/geopolitical tension)
    - LMT       # Lockheed Martin — defense contractor
    - RTX       # RTX Corp (Raytheon) — defense/aerospace
    - NOC       # Northrop Grumman — defense contractor
  # Regime indicators — read for regime detection, not traded directly
  regime_indicators:
    - VIXY      # VIX short-term futures ETF — fear/volatility gauge
    - IEF       # 7-10 Year Treasury Bond ETF — intermediate bonds
    - HYG       # High Yield Corporate Bond ETF — credit risk barometer
    - DIA       # Dow Jones ETF — broad market (diversifies from SPY/QQQ tech bias)
  # Micro futures — traded by futures_trend strategy (paper trading)
  # Micro contracts: 1/10th of standard contracts, lower margin requirements
  futures_watchlist:
    - symbol: MES             # Micro E-mini S&P 500 ($5/point, ~$1.5K margin)
      exchange: CME
    - symbol: MNQ             # Micro E-mini Nasdaq 100 ($2/point, ~$1.8K margin)
      exchange: CME
    - symbol: MYM             # Micro E-mini Dow ($0.50/point, ~$900 margin)
      exchange: CME
    - symbol: MGC             # Micro Gold ($10/point, ~$1K margin)
      exchange: COMEX
    - symbol: MCL             # Micro Crude Oil ($100/point, ~$800 margin)
      exchange: NYMEX

# Claude intelligence layer — qualitative analysis of trade journal data.
# Sends closed trades to Claude for strategy assessment, pattern detection,
# and Kelly fraction recommendations. Requires ANTHROPIC_API_KEY.
analysis:
  enabled: true
  model: "claude-sonnet-4-5-20250929"
  auto_apply_kelly: true       # Auto-adjust Kelly fractions from analysis
  auto_apply_params: true      # Auto-apply AI parameter suggestions (bounded +/-50%)
  min_trades_for_analysis: 10  # Skip analysis with fewer closed trades

# Market governance engine — proactive regime detection and strategy routing.
# Detects market conditions (trending, mean-reverting, choppy, calm) and
# enables/disables strategies accordingly. Never overrides safety layers.
governance:
  enabled: true
  mode: autonomous              # Dae toggles strategies based on regime + fitness data
  lookback_periods: 10          # Reduced from 20 — faster regime detection for crisis response
  min_confidence: 0.5           # Reduced from 0.6 — act faster on regime shifts
  fitness_min_trades: 5         # Trades per regime to trust fitness score
  enable_threshold: 0.5         # Fitness above this = enable strategy
  disable_threshold: 0.3        # Fitness below this = disable strategy
  bleed_window_hours: 24        # P&L trend window for bleed detection
  bleed_threshold_cents: -50    # Cumulative loss threshold
  bleed_slope_threshold: -0.5   # Cents/hour slope threshold
  max_strategies_disabled_pct: 0.75  # Never disable more than 75%
  reenable_cooldown_hours: 6    # Minimum cooldown for re-enable

# Captain's Log — streaming AI narration of bot observations and decisions.
# The bot narrates what it sees, thinks, and decides in real-time.
# Entries appear in a chat panel on the dashboard. User can reply.
captains_log:
  enabled: true
  routine_interval_seconds: 120   # Min seconds between routine narrations
  significant_interval_seconds: 60 # Min seconds between significant narrations
  max_tokens: 300                 # Max tokens per narration
  max_context_entries: 20         # Recent log entries for context window

# Heartbeat — hybrid self-regulation engine.
# Tier 1: Deterministic Python checks every trading cycle (~30s). Free.
# Tier 2: AI interpretation of HEARTBEAT.md every 30 min via Haiku (~$0.01/cycle).
# Reads mind/HEARTBEAT.md for standing orders. Writes lessons to memory/lessons.md.
heartbeat:
  enabled: true
  ai_interval_seconds: 1800        # AI heartbeat every 30 min
  pnl_alert_threshold: -5.0        # Alert if daily P&L below this
  consecutive_loss_alert: 3         # Alert after N consecutive losses per strategy
  win_rate_alert_threshold: 0.35    # Alert if strategy win rate below this
  telegram_alerts: true             # Send alerts via Telegram
  lessons_write: true               # Allow writing to lessons.md
  max_lessons_lines: 50             # Cap lessons.md at this many lines

# Lexicon Signal Generator — knowledge-based strategy overlay (Phase 2).
# Reads regime playbooks + arsenal indicators to generate enable/disable/caution
# signals for each strategy. Advisory mode logs and sends Telegram digests.
# Does NOT replace StrategyRouter — additive knowledge-based layer.
lexicon_signals:
  enabled: true
  mode: "autonomous"                  # "advisory" (log only) or "autonomous" (auto-toggle)
  confidence_threshold: 0.6          # Minimum confidence to emit a signal
  telegram_digest: true              # Send periodic Telegram signal digest
  digest_interval_hours: 6           # Hours between Telegram digests

# Auto-Research Pipeline — continuous indicator discovery (Phase 2).
# Identifies gaps in arsenal coverage by category/regime, triggers
# targeted TradingView scrapes via DeepStack API, re-scores indicators.
auto_research:
  enabled: true
  gap_check_interval_hours: 24       # How often to check for coverage gaps
  max_scrapes_per_run: 5             # Cap targeted scrapes per execution
  deepstack_api_url: "http://localhost:8000"  # DeepStack TradingView FastAPI server

# Go-Live Graduation Gate — measurable thresholds for paper -> live transition.
# Advisory only: Dae tracks progress, Eddie flips the switch.
graduation:
  enabled: true
  min_paper_trades: 50               # Minimum closed paper trades (Kalshi)
  min_win_rate: 0.45                 # Minimum win rate (45%)
  max_drawdown_pct: 15.0             # Max drawdown as % of paper balance ($300 on $2K)
  min_profitable_regimes: 2          # Must be profitable in 2+ distinct regimes
  paper_balance_cents: 200000        # Paper balance in cents ($2,000) for drawdown calc
  notify_telegram: true              # Send Telegram alert when all thresholds pass

# Stock Trading Graduation Gate — separate from Kalshi, tracks stock_momentum paper trades.
# Uses same trade_journal.db but filters by strategy='stock_momentum'.
graduation_stocks:
  enabled: true
  min_paper_trades: 30               # Fewer needed — stock trades are higher-value
  min_win_rate: 0.50                 # 50% win rate (stricter — real brokerage at stake)
  max_drawdown_pct: 10.0             # 10% max drawdown ($23 on $230 account)
  min_profitable_days: 5             # Must have 5+ profitable trading days
  min_avg_pnl_per_trade_cents: 50    # Must average $0.50+ per trade (after commissions)
  paper_balance_cents: 23000         # $230 (current IBKR net liquidation) in cents
  notify_telegram: true              # Send Telegram alert when stock gate passes

# Futures Trading Graduation Gate — tracks futures_trend paper trades.
graduation_futures:
  enabled: true
  min_paper_trades: 20               # Fewer trades — futures are higher-value
  min_win_rate: 0.45                 # 45% win rate (trend-following has lower WR, higher R:R)
  max_drawdown_pct: 8.0              # 8% max drawdown (leveraged = tighter leash)
  min_profitable_days: 3             # Must have 3+ profitable trading days
  min_avg_pnl_per_trade_cents: 100   # Must average $1.00+ per trade
  paper_balance_cents: 50000         # $500 notional paper allocation for futures
  notify_telegram: true

# Options Trading Graduation Gate — tracks options_income paper trades.
graduation_options:
  enabled: true
  min_paper_trades: 15               # Options trades are less frequent (20-45 DTE holds)
  min_win_rate: 0.60                 # 60% win rate (put selling should be high WR)
  max_drawdown_pct: 12.0             # 12% max drawdown (options can have tail risk)
  min_profitable_days: 3             # Must have 3+ profitable days
  min_avg_pnl_per_trade_cents: 75    # Must average $0.75+ per trade
  paper_balance_cents: 50000         # $500 notional paper allocation for options
  notify_telegram: true
