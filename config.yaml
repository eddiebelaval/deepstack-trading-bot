# Kalshi Trading Bot Configuration
#
# This is the main configuration file for the trading bot.
# Settings here override environment variables.
#
# Available profiles: conservative, aggressive, scalper, prediction_market
# Or set profile: null to use settings below directly.

profile: null  # Load a profile from profiles/ directory

strategies:
  - name: mean_reversion
    enabled: true
    markets:
      - platform: kalshi
        series: INXD          # S&P 500 hourly (weekdays only)
      - platform: kalshi
        series: KXGDP         # GDP markets (24/7, massive volume)
      - platform: kalshi
        series: KXCPI         # CPI/inflation markets (24/7, tight spreads)
      - platform: kalshi
        series: KXFED         # Fed rate markets (24/7)
      - platform: kalshi
        series: KXBTC         # Bitcoin markets (24/7)
    config:
      price_floor_cents: 40   # Widened from 45 — CPI/GDP markets cluster 40-60c
      price_ceiling_cents: 60 # Widened from 55 — captures more high-uncertainty markets
      take_profit_cents: 8    # Exit with profit at +8c
      stop_loss_cents: 5      # Exit with loss at -5c
      min_volume: 50          # Lowered from 100 — crypto series have lower but real volume
      min_score: 30           # Minimum opportunity score

  - name: momentum
    enabled: true             # ENABLED for multi-strategy test
    markets:
      - platform: kalshi
        series: KXGDP         # GDP — highest volume, strong trends
      - platform: kalshi
        series: KXCPI         # CPI — inflation moves create momentum
      - platform: kalshi
        series: KXBTC         # Bitcoin — inherently momentum-driven
      - platform: kalshi
        series: KXFED         # Fed rates — policy signals trend
      - platform: kalshi
        series: INXD          # S&P 500 hourly (weekdays only)
    config:
      lookback_periods: 5
      momentum_threshold: 0.03
      take_profit_cents: 10
      stop_loss_cents: 6
      min_volume: 50          # Lowered from 200 — prediction markets have lower but meaningful volume
      reversal_threshold: 0.02

  - name: combinatorial_arbitrage
    enabled: true             # ENABLED - finds pricing inconsistencies in related markets
    markets:
      - platform: kalshi
        series: KXGDP         # GDP brackets — natural combinatorial structure
      - platform: kalshi
        series: KXCPI         # CPI brackets — same structure, high volume
      - platform: kalshi
        series: KXFED         # Fed rate brackets — related outcomes
      - platform: kalshi
        series: KXBTC         # Bitcoin brackets
    config:
      min_profit_cents: 2     # Min guaranteed profit
      max_exposure_per_arb: 100
      min_liquidity: 50
      max_spread_cents: 5
      max_legs: 5
      confidence_threshold: 0.8

  - name: cross_platform_arbitrage
    enabled: true             # ENABLED - Polymarket intelligence
    markets:
      - platform: kalshi
        series: KXGDP         # GDP — likely Polymarket overlap
      - platform: kalshi
        series: KXCPI         # CPI — inflation markets on both platforms
      - platform: kalshi
        series: KXFED         # Fed — rate decisions on both platforms
      - platform: kalshi
        series: KXBTC         # Bitcoin — strong Polymarket presence
      - platform: polymarket
        series: "*"           # Data source only (read-only, fuzzy matches)
    config:
      # Price difference threshold to trigger signal
      price_diff_threshold_cents: 5
      # Market matching configuration
      min_match_score: 0.6    # Minimum fuzzy match confidence (0-1)
      max_expiry_diff_days: 7 # Max days between expiry dates for match
      # Volume filters
      min_polymarket_volume: 10000  # Min Polymarket 24h volume in dollars
      min_kalshi_volume: 50         # Lowered from 100 — prediction market volume is lower
      # Volume momentum confirmation
      use_volume_confirmation: true
      volume_momentum_threshold: 1.5  # 50% volume increase = momentum
      # Risk management
      take_profit_cents: 5    # Exit when price converges 5c
      stop_loss_cents: 3      # Tight stop for cross-platform plays
      min_score: 40           # Higher bar for cross-platform signals

  # === Prediction Market Native Strategies (disabled by default) ===

  - name: high_probability_bonds
    enabled: false            # Buy 93-98c contracts, hold to settlement
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_probability_cents: 93
      max_probability_cents: 98
      min_volume: 500
      max_hours_to_expiry: 72
      stop_loss_cents: 8
      take_profit_cents: 2
      min_score: 30

  - name: calibration_edge
    enabled: false            # Exploit favorite-longshot bias
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_edge_cents: 3
      favorite_threshold_cents: 70
      longshot_threshold_cents: 30
      take_profit_cents: 6
      stop_loss_cents: 4

  - name: weather_aggregation
    enabled: false            # Trade weather markets via model consensus
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_edge_cents: 5
      min_model_consensus: 0.7
      target_cities: ["new_york", "chicago"]
      max_hours_to_settlement: 48
      take_profit_cents: 7
      stop_loss_cents: 5

  - name: news_sentiment_fade
    enabled: false            # Fade overreactions (needs ANTHROPIC_API_KEY)
    markets:
      - platform: kalshi
        series: "*"
    config:
      spike_threshold_cents: 10
      spike_window_minutes: 5
      min_volume_surge: 2.0
      llm_overreaction_threshold: 0.6
      max_hold_hours: 4
      enable_llm: true
      take_profit_cents: 6
      stop_loss_cents: 4

  - name: correlated_event_arbitrage
    enabled: false            # Trade logical relationship mispricings
    markets:
      - platform: kalshi
        series: "*"
    config:
      min_implication_edge_cents: 3
      min_match_confidence: 0.7
      max_legs: 3
      relationship_types: ["implication", "complement", "subset"]
      take_profit_cents: 5
      stop_loss_cents: 4

  - name: domain_specialization
    enabled: false            # Multi-signal domain expertise (needs tuning)
    markets:
      - platform: kalshi
        series: "*"
    config:
      domain: crypto_price
      min_signal_strength: 0.6
      take_profit_cents: 8
      stop_loss_cents: 5

  # === New Strategies (Feb 2026) ===

  - name: crypto_intraday
    enabled: true             # ENABLED — KXBTC has 1K+ volume, 24/7
    markets:
      - platform: kalshi
        series: "KXBTC"
      - platform: kalshi
        series: "KXETH"
      - platform: kalshi
        series: "KXSOL"
    config:
      price_source: coingecko
      min_edge_cents: 3
      take_profit_cents: 6
      stop_loss_cents: 4
      min_volume: 50
      max_hold_minutes: 45

  - name: bear_macro
    enabled: false            # Economic indicator trading via FRED (needs FRED_API_KEY)
    markets:
      - platform: kalshi
        series: "KXFED"
      - platform: kalshi
        series: "KXCPI"
      - platform: kalshi
        series: "KXGDP"
      - platform: kalshi
        series: "KXJOBS"
    config:
      min_edge_cents: 5
      bear_mode_only: false
      take_profit_cents: 10
      stop_loss_cents: 7
      min_volume: 50
      max_hold_hours: 168

  - name: market_making
    enabled: false            # Non-directional spread capture
    markets:
      - platform: kalshi
        series: "KXBTC"
      - platform: kalshi
        series: "KXETH"
      - platform: kalshi
        series: "INXD"
    config:
      min_spread_cents: 3
      max_spread_cents: 15
      inventory_limit: 10
      skew_per_contract: 1
      take_profit_cents: 3
      stop_loss_cents: 5
      min_volume: 50

  - name: tiktok_velocity
    enabled: false            # TikTok social arbitrage (needs vaderSentiment)
    markets:
      - platform: kalshi
        series: "INXDJ"       # Index markets for sentiment
      - platform: kalshi
        series: "KXCPI"       # Inflation markets
      - platform: kalshi
        series: "KXBTC"       # Crypto markets
      - platform: kalshi
        series: "KXFED"       # Fed/rate markets
    config:
      velocity_threshold: 0.6
      sentiment_threshold: 0.2
      ema_periods: 12
      max_hashtag_age_hours: 4
      take_profit_cents: 12
      stop_loss_cents: 6
      min_volume: 150
      max_positions: 3
      api_delay_ms: 1000
      hashtags:
        - "recession"
        - "inflation"
        - "crypto"
        - "bitcoin"
        - "ethereum"
        - "fed"
        - "stockmarket"
        - "sp500"
        - "nasdaq"
        - "jobs"
        - "unemployment"
        - "gdp"
        - "ai"
        - "crash"
        - "bullmarket"
        - "bearmarket"

risk:
  max_position_size: 50       # Max dollars per trade
  daily_loss_limit: 100       # Stop trading after this daily loss
  kelly_fraction: 0.5         # Use half-Kelly for safety

learning:
  prior_strength: 20          # Bayesian k: trades needed to equal prior weight
  decay_half_life: 30.0       # Days until trade weight halves
  auto_disable: false         # Flag unhealthy strategies, don't auto-kill
